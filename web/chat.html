<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>聊天 - Matchpoint(寻星)</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="chat">
    <header class="topbar">
      <a class="brand" href="/">Matchpoint(寻星)</a>
      <nav class="nav">
        <a data-nav href="/">首页</a>
        <a data-nav href="/profile.html">个人主页</a>
        <a data-nav href="/chat.html">聊天</a>
      </nav>
      <div class="topbar-right">
        <span id="userBadge">未登录</span>
        <button id="logoutBtn" class="secondary">退出登录</button>
      </div>
    </header>

    <main class="page chat-page">
      <aside class="card chat-side">
        <div class="chat-side-header">
          <h3>历史会话</h3>
          <button id="newConversationBtn">新建会话</button>
        </div>
        <p class="subtle">建议提具体问题，例如“我想冲中金暑期实习，接下来 8 周如何安排？”</p>
        <div id="conversationList" class="list"></div>
      </aside>

      <section class="chat-core card">
        <div class="chat-header">
          <h2>Matchpoint 对话</h2>
          <span class="subtle">回答将优先基于资料库内容</span>
        </div>
        <div id="messages" class="messages"></div>
        <form id="askForm" class="ask-bar">
          <textarea
            name="question"
            id="questionInput"
            rows="3"
            placeholder="输入你的问题（越具体越好）"
            required
          ></textarea>
          <button type="submit">发送</button>
        </form>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js"></script>
  </body>
</html>
